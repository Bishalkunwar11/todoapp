<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #e8f5e9 0%, #f0f0f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 560px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            padding: 28px 24px;
            margin-top: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            color: #4CAF50;
            margin: 0;
            font-size: 1.8rem;
        }

        header h1 i { margin-right: 8px; }

        /* ── Form ── */
        .add-todo-form {
            background: #f9fbe7;
            border: 1px solid #dcedc8;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 12px; }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 0.9rem;
            color: #333;
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            resize: vertical;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76,175,80,0.15);
        }

        .form-group input.invalid,
        .form-group textarea.invalid { border-color: #e53935; }

        .error-msg {
            display: block;
            color: #e53935;
            font-size: 0.82rem;
            margin-top: 4px;
            min-height: 16px;
        }

        .char-count {
            display: block;
            text-align: right;
            font-size: 0.78rem;
            color: #888;
            margin-top: 2px;
        }

        .char-count.near-limit { color: #e53935; }

        .btn-add {
            width: 100%;
            padding: 11px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add:hover { background-color: #43A047; }
        .btn-add:disabled { opacity: 0.6; cursor: not-allowed; }

        /* ── Section header ── */
        .todo-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .todo-section-header h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #333;
        }

        .badge {
            background: #4CAF50;
            color: #fff;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.82rem;
            font-weight: bold;
        }

        .filter-btns { display: flex; gap: 6px; }

        .filter-btn {
            background: transparent;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #555;
        }

        .filter-btn.active {
            background: #4CAF50;
            border-color: #4CAF50;
            color: #fff;
        }

        /* ── States ── */
        .loading-state, .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: #888;
        }

        .loading-state i, .empty-state i {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 10px;
        }

        .empty-state i { color: #c8e6c9; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #323232;
            color: #fff;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 9999;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: #c62828; }
        .toast.success { background: #2e7d32; }

        /* ── Todo list ── */
        .todo-list { list-style: none; padding: 0; margin: 0; }

        .todo-item {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: box-shadow 0.2s, opacity 0.3s;
        }

        .todo-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .todo-item.completed { opacity: 0.6; }

        .todo-item.completed .todo-title { text-decoration: line-through; color: #888; }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            min-width: 20px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #4CAF50;
        }

        .todo-content { flex: 1; min-width: 0; }

        .todo-title {
            font-weight: bold;
            font-size: 0.95rem;
            word-break: break-word;
            margin-bottom: 3px;
        }

        .todo-text {
            font-size: 0.85rem;
            color: #666;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .todo-meta {
            font-size: 0.75rem;
            color: #bbb;
            margin-top: 4px;
        }

        .delete-button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #bbb;
            font-size: 1rem;
            padding: 4px;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .delete-button:hover { color: #e53935; }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 20px 14px; margin-top: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1><i class="fas fa-tasks"></i> Todo App</h1>
    </header>

    <!-- Add form -->
    <form class="add-todo-form" id="todoForm" novalidate>
        <div class="form-group">
            <label for="title">Title <span style="color:#e53935">*</span></label>
            <input type="text" id="title" name="title" placeholder="Enter a short title…" maxlength="100" autocomplete="off">
            <span class="char-count" id="titleCount">0 / 100</span>
            <span class="error-msg" id="titleError"></span>
        </div>
        <div class="form-group">
            <label for="text">Description <span style="color:#aaa;font-weight:normal">(optional)</span></label>
            <textarea id="text" name="text" placeholder="Add more details…" rows="3" maxlength="500"></textarea>
            <span class="char-count" id="textCount">0 / 500</span>
        </div>
        <button type="submit" class="btn-add" id="addTodoBtn">
            <i class="fas fa-plus"></i> Add Todo
        </button>
    </form>

    <!-- List -->
    <div class="todo-section-header">
        <h2>My Todos <span class="badge" id="todoBadge">0</span></h2>
        <div class="filter-btns">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="done">Done</button>
        </div>
    </div>

    <div class="loading-state" id="loadingState">
        <i class="fas fa-spinner fa-spin"></i>
        Loading todos…
    </div>

    <div class="empty-state" id="emptyState" style="display:none">
        <i class="fas fa-clipboard-list"></i>
        No todos here. Add one above!
    </div>

    <ul class="todo-list" id="todoList"></ul>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
    // ── State ──────────────────────────────────────────────────────────────────
    let todos = [];
    let currentFilter = 'all';

    // ── Helpers ────────────────────────────────────────────────────────────────
    function showToast(msg, type = 'info') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getFiltered() {
        if (currentFilter === 'active') return todos.filter(t => !t.completed);
        if (currentFilter === 'done')   return todos.filter(t => t.completed);
        return todos;
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function renderTodos() {
        const list = document.getElementById('todoList');
        const emptyState = document.getElementById('emptyState');
        const badge = document.getElementById('todoBadge');
        const filtered = getFiltered();

        badge.textContent = todos.length;
        list.innerHTML = '';

        if (filtered.length === 0) {
            emptyState.style.display = 'block';
            return;
        }
        emptyState.style.display = 'none';

        filtered.forEach(todo => {
            const li = document.createElement('li');
            li.classList.add('todo-item');
            if (todo.completed) li.classList.add('completed');
            li.dataset.title = todo.title;

            li.innerHTML = `
                <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}
                       title="Mark as ${todo.completed ? 'active' : 'done'}"
                       aria-label="Toggle ${todo.title}">
                <div class="todo-content">
                    <div class="todo-title">${escapeHtml(todo.title)}</div>
                    ${todo.text ? `<div class="todo-text">${escapeHtml(todo.text)}</div>` : ''}
                    <div class="todo-meta"><i class="far fa-calendar-alt"></i> ${formatDate(todo.createdAt)}</div>
                </div>
                <button class="delete-button" title="Delete todo" aria-label="Delete ${todo.title}">
                    <i class="fas fa-trash-alt"></i>
                </button>`;

            li.querySelector('.todo-checkbox').addEventListener('change', () => toggleTodo(todo.title, li));
            li.querySelector('.delete-button').addEventListener('click', () => deleteTodo(todo.title, li));

            list.appendChild(li);
        });
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // ── API calls ──────────────────────────────────────────────────────────────
    async function loadTodos() {
        document.getElementById('loadingState').style.display = 'block';
        document.getElementById('emptyState').style.display = 'none';
        try {
            const res = await fetch('/todos');
            if (!res.ok) throw new Error('Server error');
            todos = await res.json();
            renderTodos();
        } catch (err) {
            showToast('Failed to load todos. Is the server running?', 'error');
        } finally {
            document.getElementById('loadingState').style.display = 'none';
        }
    }

    async function toggleTodo(title, li) {
        const todo = todos.find(t => t.title === title);
        if (!todo) return;
        const newCompleted = !todo.completed;
        try {
            const res = await fetch(`/todos/${encodeURIComponent(title)}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ completed: newCompleted }),
            });
            if (!res.ok) throw new Error();
            todo.completed = newCompleted;
            renderTodos();
            showToast(newCompleted ? 'Marked as done ✓' : 'Marked as active', 'success');
        } catch {
            showToast('Failed to update todo', 'error');
            // revert checkbox
            li.querySelector('.todo-checkbox').checked = !newCompleted;
        }
    }

    async function deleteTodo(title, li) {
        if (!confirm(`Delete "${title}"?`)) return;
        li.style.opacity = '0.4';
        try {
            const res = await fetch(`/todos/${encodeURIComponent(title)}`, { method: 'DELETE' });
            if (!res.ok) throw new Error();
            todos = todos.filter(t => t.title !== title);
            renderTodos();
            showToast('Todo deleted', 'success');
        } catch {
            li.style.opacity = '1';
            showToast('Failed to delete todo', 'error');
        }
    }

    // ── Form submission ────────────────────────────────────────────────────────
    document.getElementById('todoForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const titleEl = document.getElementById('title');
        const textEl  = document.getElementById('text');
        const errorEl = document.getElementById('titleError');
        const btn     = document.getElementById('addTodoBtn');

        // Clear previous error
        errorEl.textContent = '';
        titleEl.classList.remove('invalid');

        const title = titleEl.value.trim();
        if (!title) {
            titleEl.classList.add('invalid');
            errorEl.textContent = 'Title is required.';
            titleEl.focus();
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding…';

        try {
            const res = await fetch('/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, text: textEl.value.trim() }),
            });

            const data = await res.json();

            if (res.status === 409) {
                titleEl.classList.add('invalid');
                errorEl.textContent = 'A todo with this title already exists.';
                titleEl.focus();
                return;
            }
            if (!res.ok) {
                showToast(data.error || 'Failed to add todo', 'error');
                return;
            }

            todos.unshift(data);
            renderTodos();
            titleEl.value = '';
            textEl.value = '';
            updateCount('titleCount', 0, 100);
            updateCount('textCount', 0, 500);
            showToast('Todo added!', 'success');
            titleEl.focus();
        } catch {
            showToast('Network error – please try again', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-plus"></i> Add Todo';
        }
    });

    // ── Character counters ─────────────────────────────────────────────────────
    function updateCount(spanId, len, max) {
        const el = document.getElementById(spanId);
        el.textContent = `${len} / ${max}`;
        el.classList.toggle('near-limit', len > max * 0.9);
    }

    document.getElementById('title').addEventListener('input', function () {
        updateCount('titleCount', this.value.length, 100);
        if (this.value.trim()) {
            this.classList.remove('invalid');
            document.getElementById('titleError').textContent = '';
        }
    });

    document.getElementById('text').addEventListener('input', function () {
        updateCount('textCount', this.value.length, 500);
    });

    // ── Filter buttons ─────────────────────────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderTodos();
        });
    });

    // ── Init ───────────────────────────────────────────────────────────────────
    loadTodos();
</script>
</body>
</html>
